name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore GetFiles.sln

      - name: Build
        run: dotnet build GetFiles.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GetFiles.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: backend/tests/**/TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
