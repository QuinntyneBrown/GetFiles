name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

# Avoid two publish runs racing each other when commits land in quick succession.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GetFiles.sln

      - name: Build
        run: dotnet build GetFiles.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GetFiles.sln --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/GetFiles/GetFiles.csproj --configuration Release --no-build --output ./artifacts

      - name: Publish to NuGet
        # --skip-duplicate makes this a no-op when <Version> in the csproj is
        # unchanged, so every push to main is safe; a new version publishes only
        # when the version number is bumped.
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
